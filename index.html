&lt;style&gt;
  :root {
    --red: #CC0000;
    --dark: #1a1a1a;
    --grey: #f5f5f5;
    --white: #ffffff;
    --border: #ddd;
    --green: #2a7a3b;
    --orange: #d97706;
    --blue: #1d4ed8;
    --purple: #8b5cf6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: &#39;Segoe UI&#39;, Arial, sans-serif;
    background: #f0f0f0;
    color: var(--dark);
    min-height: 100vh;
  }

  header {
    background: linear-gradient(to right, #1a1a1a 0%, #1a1a1a 55%, #8a0000 85%, #CC0000 100%);
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 40px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .header-logo { display: flex; align-items: center; gap: 16px; }
  .header-logo img { height: 60px; }
  .header-title { font-size: 1.3rem; font-weight: 700; letter-spacing: 0.5px; }
  .header-sub { font-size: 0.8rem; color: #aaa; margin-top: 2px; }
  .header-search {
    position: relative;
    flex: 0 0 280px;
  }
  .header-search input {
    width: 100%;
    padding: 9px 16px 9px 38px;
    border-radius: 24px;
    border: none;
    background: rgba(255,255,255,0.12);
    color: white;
    font-size: 0.85rem;
    outline: none;
    transition: background 0.2s;
  }
  .header-search input::placeholder { color: rgba(255,255,255,0.5); }
  .header-search input:focus { background: rgba(255,255,255,0.22); }
  .header-search::before {
    content: &#39;🔍&#39;;
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.85rem;
    pointer-events: none;
  }

  #globalResults {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    width: 380px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    z-index: 200;
    max-height: 420px;
    overflow-y: auto;
  }
  .result-item {
    padding: 12px 16px;
    border-bottom: 1px solid #f0f0f0;
    cursor: pointer;
    transition: background 0.15s;
  }
  .result-item:last-child { border-bottom: none; }
  .result-item:hover { background: #fef2f2; }
  .result-tab { font-size: 0.7rem; color: var(--red); font-weight: 700; text-transform: uppercase; margin-bottom: 2px; }
  .result-title { font-size: 0.88rem; font-weight: 600; color: var(--dark); }
  .result-snippet { font-size: 0.78rem; color: #666; margin-top: 2px; }
  .result-empty { padding: 20px; text-align: center; color: #999; font-size: 0.85rem; }

  nav {
    background: white;
    border-bottom: 2px solid var(--border);
    display: flex;
    gap: 0;
    overflow-x: auto;
    padding: 0 40px;
  }
  nav button {
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    padding: 14px 20px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 600;
    color: #666;
    white-space: nowrap;
    transition: all 0.2s;
  }
  nav button:hover { color: var(--red); }
  nav button.active {
    color: var(--red);
    border-bottom-color: var(--red);
  }

  main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
  .section { display: none; }
  .section.active { display: block; }

  .hero {
    background: linear-gradient(135deg, var(--dark) 60%, var(--red));
    color: white;
    border-radius: 16px;
    padding: 40px;
    margin-bottom: 32px;
    position: relative;
    overflow: hidden;
  }
  .hero::after {
    content: &#39;C&#39;;
    position: absolute;
    right: -20px;
    top: -30px;
    font-size: 200px;
    font-weight: 900;
    color: rgba(255,255,255,0.05);
  }
  .hero h1 { font-size: 2rem; margin-bottom: 8px; }
  .hero p { color: #ccc; font-size: 1rem; max-width: 600px; }
  .hero-stats {
    display: flex; gap: 32px; margin-top: 24px; flex-wrap: wrap;
  }
  .stat-box {
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 14px 22px;
    text-align: center;
  }
  .stat-box strong { display: block; font-size: 1.8rem; color: white; }
  .stat-box span { font-size: 0.75rem; color: #ccc; text-transform: uppercase; letter-spacing: 1px; }

  .steps-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .step-card {
    background: white;
    border-radius: 12px;
    padding: 20px;
    border-left: 5px solid var(--red);
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    transition: transform 0.2s;
    cursor: pointer;
    position: relative;
  }
  .step-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
  .step-num {
    position: absolute; top: -10px; left: 16px;
    background: var(--red); color: white;
    border-radius: 50%; width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem; font-weight: 700;
  }
  .step-card h3 { font-size: 0.95rem; margin-top: 10px; margin-bottom: 6px; color: var(--dark); }
  .step-card p { font-size: 0.8rem; color: #555; line-height: 1.5; }
  .step-tip {
    margin-top: 8px; font-size: 0.75rem;
    background: #fff7ed; border-left: 3px solid var(--orange);
    padding: 6px 10px; border-radius: 4px; color: #7c3b00;
  }

  .card {
    background: white;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
  }
  .card h2 {
    font-size: 1.1rem;
    margin-bottom: 16px;
    color: var(--dark);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card h2 .icon { font-size: 1.3rem; }

  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th {
    background: var(--dark);
    color: white;
    padding: 10px 14px;
    text-align: left;
    font-weight: 600;
  }
  td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }

  .pieces-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }
  @media (max-width: 700px) { .pieces-grid { grid-template-columns: 1fr; } }
  .pieces-card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.075);
  }
  .pieces-header {
    padding: 12px 18px;
    font-weight: 700;
    font-size: 0.95rem;
    color: white;
    display: flex; align-items: center; gap: 8px;
  }
  .pieces-header.vend { background: var(--green); }
  .pieces-header.notvend { background: #6b7280; }
  .pieces-body { padding: 14px 18px; }
  .famille-row {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 8px 0; border-bottom: 1px solid #f0f0f0;
    font-size: 0.82rem;
  }
  .famille-row:last-child { border-bottom: none; }
  .famille-name { font-weight: 600; color: var(--dark); flex: 0 0 38%; }
  .famille-examples { color: #555; flex: 1; padding: 0 8px; }
  .famille-note { color: var(--orange); font-size: 0.75rem; flex: 0 0 28%; text-align: right; }

  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
  }
  .badge.oui { background: #dcfce7; color: #166534; }
  .badge.non { background: #fee2e2; color: #991b1b; }

  .fournisseur-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .fournisseur-card {
    background: white;
    border-radius: 12px;
    padding: 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    border-top: 4px solid var(--red);
  }
  .fournisseur-card h3 { font-size: 1rem; color: var(--red); margin-bottom: 12px; }
  .fournisseur-item { margin-bottom: 8px; font-size: 0.8rem; }
  .fournisseur-item .fam { font-weight: 700; color: var(--dark); margin-bottom: 2px; }
  .fournisseur-item .marks { color: #555; }

  .lexique-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }
  .lex-card {
    background: white;
    border-radius: 10px;
    padding: 16px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    border-left: 4px solid var(--blue);
  }
  .lex-card.synonyme-card {
    border-left: 4px solid var(--purple);
  }
  .lex-term { font-weight: 700; font-size: 0.9rem; color: var(--blue); margin-bottom: 4px; }
  .lex-card.synonyme-card .lex-term { color: var(--purple); }
  .lex-def { font-size: 0.8rem; color: #444; margin-bottom: 4px; line-height: 1.4; }
  .lex-example { font-size: 0.75rem; color: var(--orange); font-style: italic; }

  .links-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }
  .link-card {
    background: white;
    border-radius: 10px;
    padding: 18px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    display: flex; flex-direction: column; gap: 10px;
  }
  .link-card h3 { font-size: 0.9rem; font-weight: 700; color: var(--dark); }
  .link-card a {
    display: block; font-size: 0.78rem; color: var(--blue);
    text-decoration: none; padding: 4px 0;
    border-bottom: 1px solid #eee;
    transition: color 0.2s;
  }
  .link-card a:last-child { border-bottom: none; }
  .link-card a:hover { color: var(--red); }
  .link-card a::before { content: &#39;🔗 &#39;; }

  .category-title {
    padding: 10px 14px;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .cat-freinage td { border-left: 4px solid #ef4444; }
  .cat-suspension td { border-left: 4px solid #22c55e; }
  .cat-embrayage td { border-left: 4px solid #f97316; }
  .cat-direction td { border-left: 4px solid #3b82f6; }
  .cat-habitacle td { border-left: 4px solid #8b5cf6; }

  .search-bar {
    position: relative; margin-bottom: 20px;
  }
  .search-bar input {
    width: 100%; padding: 12px 16px 12px 44px;
    border: 2px solid var(--border); border-radius: 10px;
    font-size: 0.9rem; outline: none; transition: border 0.2s;
  }
  .search-bar input:focus { border-color: var(--red); }
  .search-bar::before {
    content: &#39;🔍&#39;;
    position: absolute; left: 14px; top: 13px; font-size: 1rem;
  }

  /* --- CALCULATEUR DE CONSIGNE --- */
  .calc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  @media (max-width: 768px) {
    .calc-grid { grid-template-columns: 1fr; }
  }
  .calc-inputs {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .calc-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .calc-group label {
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--dark);
  }
  .calc-group input {
    width: 100%;
    padding: 10px 14px;
    border: 2px solid var(--border);
    border-radius: 8px;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .calc-group input:focus {
    border-color: var(--red);
  }
  .calc-results-card {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 16px;
  }
  .calc-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 12px;
    border-bottom: 1px solid #e2e8f0;
  }
  .calc-row:last-child {
    border-bottom: none;
    padding-bottom: 0;
  }
  .calc-label {
    font-size: 0.88rem;
    color: #475569;
    font-weight: 500;
  }
  .calc-value {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--dark);
  }
  .calc-value.highlight {
    font-size: 1.4rem;
    color: var(--red);
  }
  .calc-explanation {
    font-size: 0.75rem;
    color: #64748b;
    margin-top: 4px;
    line-height: 1.4;
  }

  footer {
    text-align: center;
    padding: 24px;
    font-size: 0.8rem;
    color: #999;
    border-top: 1px solid var(--border);
    margin-top: 40px;
  }
  mark { background: #fef08a; border-radius: 2px; }
&lt;/style&gt;

  &lt;!-- ===== PROCESSUS ===== --&gt;
  &lt;div class=&quot;section&quot; id=&quot;processus&quot;&gt;
    &lt;div class=&quot;card&quot;&gt;
      &lt;h2&gt;&lt;span class=&quot;icon&quot;&gt;📋&lt;/span&gt; Processus de recherche d&#39;une pièce&lt;/h2&gt;
      &lt;div class=&quot;steps-grid&quot;&gt;
        &lt;div class=&quot;step-card&quot;&gt;
          &lt;div class=&quot;step-num&quot;&gt;1&lt;/div&gt;
          &lt;h3&gt;Identifier le véhicule&lt;/h3&gt;
          &lt;p&gt;Demander la plaque d&#39;immatriculation. Confirmer la MARQUE et le MODÈLE avec le client. Sans plaque : demander la référence inscrite sur la pièce d&#39;origine.&lt;/p&gt;
          &lt;div class=&quot;step-tip&quot;&gt;💡 Pour toute pièce sans référence claire : demander une photo (ex : durite, joint…)&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;step-card&quot;&gt;
          &lt;div class=&quot;step-num&quot;&gt;2&lt;/div&gt;
          &lt;h3&gt;Trouver la référence OEM&lt;/h3&gt;
          &lt;p&gt;Ouvrir Partslink24 ou Partsouq. Naviguer dans le schéma éclaté ou utiliser la barre de recherche.&lt;/p&gt;
          &lt;div class=&quot;step-tip&quot;&gt;💡 Partsouq est plus pratique pour les RENAULT&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;step-card&quot;&gt;
          &lt;div class=&quot;step-num&quot;&gt;3&lt;/div&gt;
          &lt;h3&gt;Comparer / Vérifier&lt;/h3&gt;
          &lt;p&gt;Noter les informations venant du client. Vérifier bien les pièces avant de donner le prix.&lt;/p&gt;
          &lt;div class=&quot;step-tip&quot;&gt;💡 Vérifier que la référence OEM correspond bien&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;step-card&quot;&gt;
          &lt;div class=&quot;step-num&quot;&gt;4&lt;/div&gt;
          &lt;h3&gt;Vérifier le stock&lt;/h3&gt;
          &lt;p&gt;Consulter le stock interne en priorité sur le site PAC Concorde.&lt;/p&gt;
          &lt;div class=&quot;step-tip&quot;&gt;💡 Toujours proposer le stock avant de passer commande&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;step-card&quot;&gt;
          &lt;div class=&quot;step-num&quot;&gt;5&lt;/div&gt;
          &lt;h3&gt;Commander si pas en stock&lt;/h3&gt;
          &lt;p&gt;Passer commande auprès des fournisseurs référencés. Vérifier les délais avant de confirmer.&lt;/p&gt;
          &lt;div class=&quot;step-tip&quot;&gt;💡 Rechercher toujours avec référence d&#39;origine sur les sites fournisseurs&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;card&quot;&gt;
      &lt;h2&gt;&lt;span class=&quot;icon&quot;&gt;📚&lt;/span&gt; Types de références à connaître&lt;/h2&gt;
      &lt;table&gt;
        &lt;tr&gt;&lt;th&gt;Type de référence&lt;/th&gt;&lt;th&gt;Définition&lt;/th&gt;&lt;th&gt;Exemple&lt;/th&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Référence OEM&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;Numéro officiel du fabricant du véhicule. Base de toute recherche.&lt;/td&gt;&lt;td&gt;&lt;code&gt;VW : 1K0698151G&lt;/code&gt;&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Référence Aftermarket&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;Réf d&#39;un fabricant alternatif (Bosch, Febi, LuK) compatible OEM.&lt;/td&gt;&lt;td&gt;&lt;code&gt;Bosch : 0986494062&lt;/code&gt;&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;VIN&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;17 caractères gravés sur le véhicule. Identifie précisément la version.&lt;/td&gt;&lt;td&gt;&lt;code&gt;WVWZZZ1KZ4P040640&lt;/code&gt;&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Code moteur&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;Code court identifiant le moteur exact (important pour compatibilité).&lt;/td&gt;&lt;td&gt;&lt;code&gt;BKC / BLS / BXE&lt;/code&gt;&lt;/td&gt;&lt;/tr&gt;
      &lt;/table&gt;
    &lt;/div&gt;

    &lt;div class=&quot;card&quot;&gt;
      &lt;h2&gt;&lt;span class=&quot;icon&quot;&gt;✅&lt;/span&gt; Bonnes pratiques&lt;/h2&gt;

        &lt;tr&gt;&lt;td&gt;✔ Croiser les catalogues&lt;/td&gt;&lt;td&gt;Partslink pour la ref OEM → DATABOX pour plus de détails ou informations spécifiques.&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;✔ Stock avant commande&lt;/td&gt;&lt;td&gt;Toujours vérifier le stock interne avant de commander auprès d&#39;un fournisseur.&lt;/td&gt;&lt;/tr&gt;
      &lt;/table&gt;

  &lt;!-- ===== PASSATION DE COMMANDE LOCAL ===== --&gt;
  &lt;div class=&quot;section&quot; id=&quot;commande&quot;&gt;
    &lt;div class=&quot;hero&quot;&gt;
      &lt;h1&gt;📦 Passation de commande local&lt;/h1&gt;
      &lt;p&gt;Retrouvez ici les canaux de commande et les procédures pas à pas pour passer une commande auprès de chaque fournisseur local.&lt;/p&gt;
    &lt;/div&gt;

    &lt;div class=&quot;card&quot;&gt;
      &lt;h2&gt;&lt;span class=&quot;icon&quot;&gt;🏭&lt;/span&gt; Les fournisseurs locaux&lt;/h2&gt;
      &lt;table&gt;
        &lt;tr&gt;&lt;th&gt;Fournisseur&lt;/th&gt;&lt;th&gt;Canaux pour commander&lt;/th&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;N°2 (SACI)&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;- Par Appel&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;N°8 (EQUIP AUTO)&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;- Par Appel&lt;br&gt;- Sur le site du fournisseur&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;N°16 (PIÈCES EN STOCK OU PES)&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;- Par Appel&lt;br&gt;- Sur le site du fournisseur&lt;/td&gt;&lt;/tr&gt;
      &lt;/table&gt;
    &lt;/div&gt;

    &lt;div class=&quot;card&quot;&gt;
      &lt;h2&gt;&lt;span class=&quot;icon&quot;&gt;🌐&lt;/span&gt; Procédure – N°8 (EQUIP AUTO) – Commande sur le site&lt;/h2&gt;
      &lt;div class=&quot;steps-grid&quot;&gt;
        &lt;div class=&quot;step-card&quot;&gt;
          &lt;div class=&quot;step-num&quot;&gt;1&lt;/div&gt;
          &lt;h3&gt;Vérifier la connexion&lt;/h3&gt;
          &lt;p&gt;Vérifier qu&#39;on est connecté avec les bons identifiants selon le magasin (0001, 0002, 0003, 0004).&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;step-card&quot;&gt;
          &lt;div class=&quot;step-num&quot;&gt;2&lt;/div&gt;
          &lt;h3&gt;Identifier la référence&lt;/h3&gt;
          &lt;p&gt;Identifier la référence de l&#39;article à commander.&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;step-card&quot;&gt;
          &lt;div class=&quot;step-num&quot;&gt;3&lt;/div&gt;
          &lt;h3&gt;Quantité&lt;/h3&gt;
          &lt;p&gt;Mettre la quantité à commander.&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;step-card&quot;&gt;
          &lt;div class=&quot;step-num&quot;&gt;4&lt;/div&gt;
          &lt;h3&gt;Ajouter au panier&lt;/h3&gt;
          &lt;p&gt;Mettre l&#39;article dans le panier.&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;step-card&quot;&gt;
          &lt;div class=&quot;step-num&quot;&gt;5&lt;/div&gt;
          &lt;h3&gt;Continuer ou valider&lt;/h3&gt;
          &lt;p&gt;Après avoir mis l&#39;article dans le panier, une interface s&#39;affiche : pour ajouter d&#39;autres références avant de valider, aller sur « JE CONTINUE MA RECHERCHE ». Pour valider uniquement cette référence, aller sur « ACCÈS AU PANIER ».&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;step-card&quot;&gt;
          &lt;div class=&quot;step-num&quot;&gt;6&lt;/div&gt;
          &lt;h3&gt;Renseigner le panier&lt;/h3&gt;
          &lt;p&gt;Dans le panier, renseigner le code vendeur et le numéro de commande dans les champs « RÉFÉRENCE COMMANDE » et « COMMENTAIRE », puis appuyer sur « VALIDER ».&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;step-card&quot;&gt;
          &lt;div class=&quot;step-num&quot;&gt;7&lt;/div&gt;
          &lt;h3&gt;Preuve de commande&lt;/h3&gt;
          &lt;p&gt;Sur la page suivante, appuyer sur « ÉDITER LA COMMANDE » pour voir la preuve de la commande passée.&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;card&quot;&gt;
      &lt;h2&gt;&lt;span class=&quot;icon&quot;&gt;🌐&lt;/span&gt; Procédure – N°16 (Pièces en Stock) – Commande sur le site&lt;/h2&gt;
      &lt;div class=&quot;steps-grid&quot;&gt;
        &lt;div class=&quot;step-card&quot;&gt;
          &lt;div class=&quot;step-num&quot;&gt;1&lt;/div&gt;
          &lt;h3&gt;Vérifier la connexion&lt;/h3&gt;
          &lt;p&gt;Vérifier qu&#39;on est bien connecté avec le bon login correspondant au bon magasin.&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;step-card&quot;&gt;
          &lt;div class=&quot;step-num&quot;&gt;2&lt;/div&gt;
          &lt;h3&gt;Ajouter au panier&lt;/h3&gt;
          &lt;p&gt;Mettre l&#39;article dans le panier.&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;step-card&quot;&gt;
          &lt;div class=&quot;step-num&quot;&gt;3&lt;/div&gt;
          &lt;h3&gt;Finaliser la commande&lt;/h3&gt;
          &lt;p&gt;Cliquer sur « Finaliser la commande ».&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;step-card&quot;&gt;
          &lt;div class=&quot;step-num&quot;&gt;4&lt;/div&gt;
          &lt;h3&gt;Passer la commande&lt;/h3&gt;
          &lt;p&gt;Puis cliquer sur « Passer la commande ».&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;step-card&quot;&gt;
          &lt;div class=&quot;step-num&quot;&gt;5&lt;/div&gt;
          &lt;h3&gt;Confirmer&lt;/h3&gt;
          &lt;p&gt;Cliquer sur « Confirmer ».&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;step-card&quot;&gt;
          &lt;div class=&quot;step-num&quot;&gt;6&lt;/div&gt;
          &lt;h3&gt;Livraison&lt;/h3&gt;
          &lt;p&gt;Toujours choisir « Livraison NTR ».&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;step-card&quot;&gt;
          &lt;div class=&quot;step-num&quot;&gt;7&lt;/div&gt;
          &lt;h3&gt;Adresse&lt;/h3&gt;
          &lt;p&gt;Choisir la ville à côté du magasin (adresse).&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;step-card&quot;&gt;
          &lt;div class=&quot;step-num&quot;&gt;8&lt;/div&gt;
          &lt;h3&gt;Paiement&lt;/h3&gt;
          &lt;p&gt;Cliquer sur « Paiement ».&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;step-card&quot;&gt;
          &lt;div class=&quot;step-num&quot;&gt;9&lt;/div&gt;
          &lt;h3&gt;Retrait&lt;/h3&gt;
          &lt;p&gt;Choisir « Retrait en BL ».&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;step-card&quot;&gt;
          &lt;div class=&quot;step-num&quot;&gt;10&lt;/div&gt;
          &lt;h3&gt;Conditions&lt;/h3&gt;
          &lt;p&gt;Cocher la case « Lu et accepté ».&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;step-card&quot;&gt;
          &lt;div class=&quot;step-num&quot;&gt;11&lt;/div&gt;
          &lt;h3&gt;Payer&lt;/h3&gt;
          &lt;p&gt;Enfin, cliquer sur « Payer maintenant ».&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- ===== KIT DISTRI / PAE RENAULT ===== --&gt;
  &lt;div class=&quot;section&quot; id=&quot;distrirenault&quot;&gt;
    &lt;div class=&quot;hero&quot;&gt;
      &lt;h1&gt;⚙️ Kit Distri, PAE et Courroie Accessoire – RENAULT / DACIA&lt;/h1&gt;
      &lt;p&gt;Procédure spécifique pour rechercher un kit distribution, une pompe à eau (PAE) ou une courroie accessoire sur véhicule RENAULT ou DACIA.&lt;/p&gt;
    &lt;/div&gt;

    &lt;div class=&quot;card&quot;&gt;
      &lt;h2&gt;&lt;span class=&quot;icon&quot;&gt;🌐&lt;/span&gt; Site à utiliser&lt;/h2&gt;
      &lt;p style=&quot;font-size:0.9rem; color:#444;&quot;&gt;Pour les RENAULT ou DACIA, pour ces pièces-là, on va aller sur le site &lt;a href=&quot;https://www.oscaro.com&quot; target=&quot;_blank&quot; style=&quot;color:var(--blue); font-weight:600;&quot;&gt;www.oscaro.com&lt;/a&gt;.&lt;/p&gt;
    &lt;/div&gt;

    &lt;div class=&quot;card&quot;&gt;
      &lt;h2&gt;&lt;span class=&quot;icon&quot;&gt;📋&lt;/span&gt; Procédure&lt;/h2&gt;
      &lt;div class=&quot;steps-grid&quot;&gt;
        &lt;div class=&quot;step-card&quot;&gt;
          &lt;div class=&quot;step-num&quot;&gt;1&lt;/div&gt;
          &lt;h3&gt;Immatriculation&lt;/h3&gt;
          &lt;p&gt;Mettre l&#39;immatriculation du véhicule sur le site.&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;step-card&quot;&gt;
          &lt;div class=&quot;step-num&quot;&gt;2&lt;/div&gt;
          &lt;h3&gt;Rechercher la pièce&lt;/h3&gt;
          &lt;p&gt;Taper dans la barre de recherche la pièce voulue, puis cliquer dessus :&lt;/p&gt;
          &lt;ul style=&quot;margin-top:8px; padding-left:18px; font-size:0.8rem; color:#555; line-height:1.6;&quot;&gt;
            &lt;li&gt;Kit distribution&lt;/li&gt;
            &lt;li&gt;Pompe à eau&lt;/li&gt;
            &lt;li&gt;Courroie accessoire&lt;/li&gt;
          &lt;/ul&gt;
        &lt;/div&gt;
        &lt;div class=&quot;step-card&quot;&gt;
          &lt;div class=&quot;step-num&quot;&gt;3&lt;/div&gt;
          &lt;h3&gt;Se référer à la marque&lt;/h3&gt;
          &lt;p&gt;Se référer à la marque de référence pour chaque pièce (voir tableau ci-dessous).&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;card&quot;&gt;
      &lt;h2&gt;&lt;span class=&quot;icon&quot;&gt;🏭&lt;/span&gt; Marques de référence par pièce&lt;/h2&gt;
      &lt;table&gt;
        &lt;tr&gt;&lt;th&gt;Pièce&lt;/th&gt;&lt;th&gt;Marque de référence&lt;/th&gt;&lt;th&gt;À savoir&lt;/th&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Kit distribution&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;GATES&lt;/td&gt;&lt;td&gt;S&#39;il y a 2 références en GATES, cela signifie qu&#39;il y a 2 modèles (souvent selon le nombre de dents). Proposer les 2 au client.&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Pompe à eau (PAE)&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;METELLI&lt;/td&gt;&lt;td&gt;S&#39;il y a 2 références en METELLI, cela signifie qu&#39;il y a 2 modèles. Proposer les 2 au client.&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Courroie accessoire&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;DAYCO / GATES&lt;/td&gt;&lt;td&gt;Bien informer le client de la ou des dimensions proposées (ex : 7PK1200).&lt;/td&gt;&lt;/tr&gt;
      &lt;/table&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- ===== CALCUL PRIX INJECTEUR ===== --&gt;
  &lt;div class=&quot;section&quot; id=&quot;prixinjecteur&quot;&gt;
    &lt;div class=&quot;hero&quot;&gt;
      &lt;h1&gt;💉 Calcul de prix injecteur&lt;/h1&gt;
      &lt;p&gt;Règle à appliquer pour déterminer le prix à mettre sur le devis client, selon qu&#39;il y a ou non une remise chez le fournisseur local.&lt;/p&gt;
    &lt;/div&gt;

    &lt;div class=&quot;pieces-grid&quot;&gt;
      &lt;div class=&quot;pieces-card&quot;&gt;
        &lt;div class=&quot;pieces-header vend&quot;&gt;✅ Cas 1 – Il y a une remise&lt;/div&gt;
        &lt;div class=&quot;pieces-body&quot;&gt;
          &lt;p style=&quot;font-size:0.85rem; color:#444; line-height:1.6;&quot;&gt;Si sur le fournisseur local on voit qu&#39;il y a une remise sur le prix de l&#39;injecteur (le &lt;strong&gt;prix de VENTE&lt;/strong&gt; est &lt;strong&gt;DIFFÉRENT&lt;/strong&gt; de notre &lt;strong&gt;prix d&#39;ACHAT&lt;/strong&gt;) :&lt;/p&gt;
          &lt;div class=&quot;step-tip&quot; style=&quot;margin-top:12px; font-size:0.85rem;&quot;&gt;👉 On prend directement le &lt;strong&gt;prix de VENTE&lt;/strong&gt; (le prix avant la remise) pour le mettre sur notre devis, sans plus calculer.&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;pieces-card&quot;&gt;
        &lt;div class=&quot;pieces-header notvend&quot; style=&quot;background:var(--orange)&quot;&gt;⚠️ Cas 2 – Il n&#39;y a pas de remise&lt;/div&gt;
        &lt;div class=&quot;pieces-body&quot;&gt;
          &lt;p style=&quot;font-size:0.85rem; color:#444; line-height:1.6;&quot;&gt;Si on voit qu&#39;il n&#39;y a pas de remise sur le prix de l&#39;injecteur (le &lt;strong&gt;prix de VENTE&lt;/strong&gt; est &lt;strong&gt;LE MÊME&lt;/strong&gt; que notre &lt;strong&gt;prix d&#39;ACHAT&lt;/strong&gt;) :&lt;/p&gt;
          &lt;div class=&quot;step-tip&quot; style=&quot;margin-top:12px; font-size:0.85rem;&quot;&gt;👉 On calcule le prix de l&#39;injecteur comme suit : &lt;strong&gt;PRIX DE L&#39;INJECTEUR × 1.15&lt;/strong&gt;. C&#39;est ce résultat qu&#39;on met sur notre devis.&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;card&quot;&gt;
      &lt;h2&gt;&lt;span class=&quot;icon&quot;&gt;📚&lt;/span&gt; Résumé de la règle&lt;/h2&gt;
      &lt;table&gt;
        &lt;tr&gt;&lt;th&gt;Situation&lt;/th&gt;&lt;th&gt;Prix à mettre sur le devis&lt;/th&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;Prix de VENTE ≠ Prix d&#39;ACHAT (remise visible)&lt;/td&gt;&lt;td&gt;Prix de VENTE (avant remise), tel quel&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;Prix de VENTE = Prix d&#39;ACHAT (pas de remise)&lt;/td&gt;&lt;td&gt;Prix de l&#39;injecteur × 1.15&lt;/td&gt;&lt;/tr&gt;
      &lt;/table&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- ===== CALCUL DE CONSIGNE ===== --&gt;
  &lt;div class=&quot;section&quot; id=&quot;calculconsigne&quot;&gt;
    &lt;div class=&quot;hero&quot;&gt;
      &lt;h1&gt;💰 Calcul &amp; Gestion de la Consigne&lt;/h1&gt;
      &lt;p&gt;Retrouvez ici les règles de facturation de la consigne (Échange Standard) pour les commandes en provenance de Métropole ou passées localement.&lt;/p&gt;
    &lt;/div&gt;

    &lt;div class=&quot;pieces-grid&quot;&gt;
      &lt;!-- Regles Metropole --&gt;
      &lt;div class=&quot;pieces-card&quot; style=&quot;box-shadow: 0 4px 12px rgba(29, 78, 216, 0.15);&quot;&gt;
        &lt;div class=&quot;pieces-header vend&quot; style=&quot;background: var(--blue);&quot;&gt;✈️ Commandes Métropole&lt;/div&gt;
        &lt;div class=&quot;pieces-body&quot; style=&quot;min-height: 180px; display: flex; flex-direction: column; justify-content: space-between;&quot;&gt;
          &lt;p style=&quot;font-size:0.88rem; color:#444; line-height:1.6;&quot;&gt;
            Pour les commandes en Métropole, la procédure est simplifiée et linéaire :
          &lt;/p&gt;
          &lt;div class=&quot;step-tip&quot; style=&quot;margin-top:14px; font-size:0.88rem; background: #eff6ff; border-left-color: var(--blue); color: #1e3a8a;&quot;&gt;
            👉 On calcule d&#39;abord le &lt;strong&gt;prix de la pièce normalement&lt;/strong&gt; (hors consigne), puis on &lt;strong&gt;rajoute simplement le prix de la consigne&lt;/strong&gt; au prix final ainsi calculé.
          &lt;/div&gt;
          &lt;div style=&quot;font-size: 0.75rem; color: #64748b; margin-top: 10px; font-style: italic;&quot;&gt;
            Formule : Prix Facturé = (Prix de la Pièce Calculé) + Prix Consigne
          &lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;!-- Explication Generique --&gt;
      &lt;div class=&quot;pieces-card&quot;&gt;
        &lt;div class=&quot;pieces-header notvend&quot;&gt;ℹ️ Qu&#39;est-ce qu&#39;une consigne ?&lt;/div&gt;
        &lt;div class=&quot;pieces-body&quot; style=&quot;min-height: 180px; display: flex; flex-direction: column; justify-content: space-between;&quot;&gt;
          &lt;p style=&quot;font-size:0.85rem; color:#444; line-height:1.6;&quot;&gt;
            La consigne est un dépôt de garantie facturé à l&#39;achat d&#39;une pièce neuve ou reconditionnée (comme un alternateur ou une crémaillère de direction). Ce système, lié à l&#39;&lt;strong&gt;échange standard&lt;/strong&gt;, incite à renvoyer la pièce usagée.
          &lt;/p&gt;
          &lt;div class=&quot;step-tip&quot; style=&quot;margin-top:12px; font-size:0.82rem; background: #f0fdf4; border-left-color: var(--green); color: #14532d;&quot;&gt;
            💡 Dès réception de l&#39;ancienne pièce (la carcasse), la consigne est intégralement remboursée au client.
          &lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

          &lt;/div&gt;

          &lt;/div&gt;
        &lt;/div&gt;

        &lt;!-- Zone des résultats --&gt;
        &lt;div class=&quot;calc-results-card&quot;&gt;
          &lt;h3 style=&quot;font-size: 1rem; color: var(--dark); font-weight: 700; margin-bottom: 8px;&quot;&gt;📊 Résultats calculés&lt;/h3&gt;
          
          &lt;div class=&quot;calc-row&quot;&gt;

          &lt;/div&gt;
          
          &lt;div class=&quot;calc-row&quot;&gt;
            &lt;span class=&quot;calc-label&quot;&gt;Prix achat final (Pièce + Consigne) :&lt;/span&gt;
            &lt;span class=&quot;calc-value&quot; id=&quot;res_prixFinal&quot;&gt;95.00 €&lt;/span&gt;
          &lt;/div&gt;
          
          &lt;div class=&quot;calc-row&quot; style=&quot;background: #f0fdf4; padding: 12px; border-radius: 8px; border: 1px dashed var(--green);&quot;&gt;
            &lt;div style=&quot;display: flex; flex-direction: column;&quot;&gt;
              &lt;span class=&quot;calc-label&quot; style=&quot;color: var(--green); font-weight: 700;&quot;&gt;Prix de revente conseillé (X&#39;) :&lt;/span&gt;
              &lt;span style=&quot;font-size: 0.72rem; color: #3f6212; margin-top: 2px;&quot;&gt;Intègre proportionnellement l&#39;impact de la consigne sur la revente brute&lt;/span&gt;
            &lt;/div&gt;
            &lt;span class=&quot;calc-value highlight&quot; id=&quot;res_xPrime&quot;&gt;158.33 €&lt;/span&gt;
          &lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

// ---- LOGIQUE CALCUL DE CONSIGNE LOCALE ----
function runConsigneCalculator() {
  const prixVente = parseFloat(document.getElementById(&#39;c_prixVente&#39;).value) || 0;
  const remise = parseFloat(document.getElementById(&#39;c_remise&#39;).value) || 0;
  const consigne = parseFloat(document.getElementById(&#39;c_consigne&#39;).value) || 0;

  const prixRemise = prixVente * (1 - remise / 100);
  const prixFinal = prixRemise + consigne;
  
  let xPrime = 0;
  if (prixRemise &gt; 0) {
    xPrime = (prixFinal * prixVente) / prixRemise;
  }

  document.getElementById(&#39;res_prixRemise&#39;).innerText = prixRemise.toFixed(2) + &#39; €&#39;;
  document.getElementById(&#39;res_prixFinal&#39;).innerText = prixFinal.toFixed(2) + &#39; €&#39;;
  document.getElementById(&#39;res_xPrime&#39;).innerText = xPrime.toFixed(2) + &#39; €&#39;;
}

function globalSearch() {
  const q = document.getElementById(&#39;globalSearch&#39;).value.trim().toLowerCase();
  const box = document.getElementById(&#39;globalResults&#39;);
  if (q.length &lt; 2) { box.style.display = &#39;none&#39;; return; }

  const results = searchIndex.filter(item =&gt;
    item.title.toLowerCase().includes(q) || item.text.toLowerCase().includes(q)
  ).slice(0, 8);

  if (results.length === 0) {
    box.innerHTML = &#39;&lt;div class=&quot;result-empty&quot;&gt;Aucun résultat pour « &#39; + q + &#39; »&lt;/div&gt;&#39;;
  } else {
    box.innerHTML = results.map(r =&gt; `
      &lt;div class=&quot;result-item&quot; onclick=&quot;goToResult(&#39;${r.tab}&#39;)&quot;&gt;
        &lt;div class=&quot;result-tab&quot;&gt;${tabLabels[r.tab]}&lt;/div&gt;
        &lt;div class=&quot;result-title&quot;&gt;${highlight(r.title, q)}&lt;/div&gt;
        &lt;div class=&quot;result-snippet&quot;&gt;${highlight(r.text.slice(0, 80), q)}…&lt;/div&gt;
      &lt;/div&gt;
    `).join(&#39;&#39;);
  }
  box.style.display = &#39;block&#39;;
}

function highlight(text, q) {
  const re = new RegExp(&#39;(&#39; + q.replace(/[.*+?^${}()|[\]\\]/g, &#39;\\$&amp;&#39;) + &#39;)&#39;, &#39;gi&#39;);
  return text.replace(re, &#39;&lt;mark&gt;$1&lt;/mark&gt;&#39;);
}

function goToResult(tab) {
  showTab(tab);
  document.getElementById(&#39;globalSearch&#39;).value = &#39;&#39;;
  document.getElementById(&#39;globalResults&#39;).style.display = &#39;none&#39;;
}

// Close results on outside click
document.addEventListener(&#39;click&#39;, function(e) {

    document.getElementById(&#39;globalResults&#39;).style.display = &#39;none&#39;;
  }
});
